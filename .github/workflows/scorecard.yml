# OpenSSF Scorecard — supply-chain security posture (read-only telemetry).
#
# This workflow analyzes the repository against the OpenSSF Scorecard checks and uploads
# the result to the code-scanning dashboard. It is an INTERNAL signal: the README badge is
# intentionally NOT wired up until the first run's score has been reviewed by a human
# (a low score driven by unpinned actions in the release pipeline would otherwise advertise
# a weak number on a tool that sells rigor). See .omc/plans/v1.1-trust-polish.md.
#
# Note: uploading SARIF to code scanning requires GitHub code scanning to be enabled on the
# repository. If it is not, the upload step warns but the Scorecard analysis still runs.
#
# Uses third-party actions (ossf/scorecard-action) governed by their own terms.

name: Scorecard supply-chain security

on:
  # For the Branch-Protection check (default branch only).
  branch_protection_rule:
  # Keeps the Maintained check fresh.
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC
  push:
    branches: ["main"]

# Default to read-only at the top level (Scorecard's Token-Permissions check).
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # publish_results only works from the default branch.
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      security-events: write # upload results to the code-scanning dashboard
      id-token: write # OIDC token for publish_results (badge/REST API)

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the OpenSSF REST API (enables the badge once we choose to wire it up).
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
