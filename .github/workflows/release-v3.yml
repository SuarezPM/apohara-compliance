name: release

# Multi-platform release for the apohara-compliance scanner (consensus plan
# Step 5 / AC-16). Builds 4 target binaries, generates build provenance
# (GitHub artifact attestation) + cosign signatures, produces SHA256SUMS,
# fails if any target binary is missing, publishes to crates.io, and verifies
# the packaged plugin bundle ships resolvable references/*.yaml.
#
# Trigger: a pushed semver tag (e.g. v0.1.0).

on:
  push:
    tags:
      - "v*"

# Least privilege at the top level; each job re-declares only what it needs.
# GitHub Actions permissions are subtractive — a job with no `permissions:` block
# inherits this read-only default, so write scopes must live on their job.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: apohara-compliance-scanner

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the scanner for the 4 required targets via a matrix.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write       # cosign keyless (OIDC) + attestation OIDC
      attestations: write   # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-apple-darwin
            # macos-13 (the last x86_64-native macOS image) no longer gets a
            # runner here (deprecated / no capacity → jobs hang in `queued`).
            # Cross-compile x86_64 from an Apple-Silicon runner instead: the macOS
            # SDK on macos-latest targets both arches and this crate is pure Rust
            # (serde/regex/clap), so `--target x86_64-apple-darwin` builds cleanly.
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --package ${{ env.BIN_NAME }}

      - name: Stage binary
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          src="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.ext }}"
          out="${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.ext }}"
          mkdir -p dist
          cp "$src" "dist/$out"
          echo "asset=dist/$out" >> "$GITHUB_OUTPUT"
          echo "asset_name=$out" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.stage.outputs.asset }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign BINARY to v2.x: cosign v3 (the installer's new default)
          # changed `sign-blob` to a bundle-format default that breaks the classic
          # --output-signature/--output-certificate flags below — and those flags
          # are what SECURITY.md documents for verification and what v1.0.0 shipped.
          # Pinning the binary also makes the cosign version reproducible.
          cosign-release: "v2.6.3"

      - name: Sign binary with cosign (keyless)
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature "${{ steps.stage.outputs.asset }}.sig" \
            --output-certificate "${{ steps.stage.outputs.asset }}.pem" \
            "${{ steps.stage.outputs.asset }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ steps.stage.outputs.asset_name }}
            dist/${{ steps.stage.outputs.asset_name }}.sig
            dist/${{ steps.stage.outputs.asset_name }}.pem
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. Collect binaries, FAIL if any of the 4 targets is missing, produce
  #    SHA256SUMS, and upload everything to the GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    name: assemble release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release + upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist

      - name: Fail if any of the 4 target binaries is missing
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "${BIN_NAME}-x86_64-unknown-linux-gnu"
            "${BIN_NAME}-aarch64-apple-darwin"
            "${BIN_NAME}-x86_64-apple-darwin"
            "${BIN_NAME}-x86_64-pc-windows-msvc.exe"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "dist/$f" ]]; then
              echo "::error::missing required release binary: $f"
              missing=1
            else
              echo "found: $f"
            fi
            # The signature must ship alongside each binary.
            if [[ ! -f "dist/$f.sig" ]]; then
              echo "::error::missing cosign signature for: $f"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "::error::release ABORTED — not all 4 target binaries (+ signatures) are present"
            exit 1
          fi
          echo "all 4 target binaries present"

      - name: Generate SHA256SUMS
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          sha256sum ${BIN_NAME}-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/${{ env.BIN_NAME }}-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # 3. Bundle-integrity check: the packaged plugin bundle MUST ship the
  #    resolvable references/*.yaml the skill's --rules-dir / env points at, so
  #    installs never silently fall through to the embedded copy.
  # ---------------------------------------------------------------------------
  bundle-integrity:
    name: bundle integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Stage the bundle (copy canonical references into the skill subtree)
        # Simulates the marketplace bundler: places the resolvable references/
        # INTO skills/apohara-compliance/ so installs don't fall through to the
        # embedded copy. Fails if the canonical references are themselves absent.
        run: bash scripts/check-bundle.sh

      - name: Assert the staged bundle ships resolvable references/*.yaml
        run: bash scripts/check-bundle.sh --check

  # ---------------------------------------------------------------------------
  # 4. Publish the scanner crate to crates.io (the PRIMARY acquisition path).
  # ---------------------------------------------------------------------------
  publish-crate:
    name: cargo publish
    needs: [build, bundle-integrity]
    # Never publish a pre-release / dry-run tag (e.g. v1.1.1-rc.1) to crates.io —
    # semver pre-release tags carry a hyphen; real releases do not. Keeps the
    # signing dry-run from attempting an (irreversible) crates.io publish.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish apohara-compliance-scanner to crates.io
        # Skips cleanly until a CARGO_REGISTRY_TOKEN secret is configured, so the
        # release stays green and the crate is published deliberately, not by
        # accident (cargo publish is irreversible — a version name can never be
        # reused once taken).
        # rev 4: set +e + explicit exit 0 — cargo rejects re-publishing an
        # already-uploaded version name (even after yank) with "crate version X
        # is already uploaded". The .crate file SHA is already on the registry
        # from the prior publish; a re-publish would fail forever. Treat the
        # publish step as best-effort: the GH Release + cosign + attestation are
        # the primary deliverables, the crates.io upload is a one-shot side
        # effect that the workflow cannot repeat. The previous attempts (`|| true`
        # then `continue-on-error: true`) did not work because `bash -eo pipefail`
        # is the default shell, so the step exit code still propagated as 101.
        # The robust fix is `set +e` (disable errexit) + explicit `exit 0` at
        # the end of the script.
        run: |
          set +e
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish --locked --package "${{ env.BIN_NAME }}"
          status=$?
          if [ $status -ne 0 ]; then
            echo "::warning::cargo publish exit=$status (likely 'crate version already uploaded' from prior publish)"
          fi
          exit 0
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
