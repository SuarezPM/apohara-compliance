# CodeQL static analysis (OpenSSF Scorecard SAST check).
#
# Rust analysis with build-mode: none (GA since CodeQL 2.23.3, Oct 2025) — no
# build is invoked; rust-analyzer reads the sources (a Cargo.toml is present).
# All actions SHA-pinned; least-privilege permissions.

name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "33 5 * * 2" # Tuesdays 05:33 UTC

# No permissions by default; the analyze job grants only what it needs.
permissions: {}

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the code-scanning dashboard
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:rust"
